<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 브랜드 전략 파트너</title>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 브랜드 전략 파트너</h1>
            <p>클라이언트 정보를 입력하면 AI가 브랜드 전략을 자동으로 설계합니다</p>
        </header>

        <form id="inputForm" class="card">
            <div class="form-grid">
                <div class="form-group">
                    <label>브랜드 / 클라이언트명 <span class="req">*</span></label>
                    <input type="text" id="brandName" placeholder="예: 루나 코스메틱" required>
                </div>
                <div class="form-group">
                    <label>업종 <span class="req">*</span></label>
                    <select id="industry" required>
                        <option value="">선택하세요</option>
                        <option>패션</option>
                        <option>식음료</option>
                        <option>뷰티 / 코스메틱</option>
                        <option>라이프스타일</option>
                        <option>테크</option>
                        <option>헬스케어</option>
                        <option>교육</option>
                        <option>기타</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>타겟 지역 <span class="req">*</span></label>
                    <input type="text" id="region" placeholder="예: 국내, 서울/수도권, 동남아시아" required>
                </div>
                <div class="form-group">
                    <label>경쟁 브랜드</label>
                    <input type="text" id="competitors" placeholder="예: 이니스프리, 라운드랩">
                </div>
                <div class="form-group">
                    <label>원하는 느낌 <span class="req">*</span></label>
                    <input type="text" id="feeling" placeholder="예: 따뜻한, 자연스러운, 고급스러운" required>
                </div>
                <div class="form-group">
                    <label>주요 타겟 <span class="req">*</span></label>
                    <input type="text" id="targetAudience" placeholder="예: 20-30대 여성, 직장인" required>
                </div>
            </div>

            <div class="form-group">
                <label>레퍼런스 이미지</label>
                <div class="upload-zone" onclick="document.getElementById('imageInput').click()">
                    <span id="uploadText">이미지를 클릭하여 업로드 (선택)</span>
                    <input type="file" id="imageInput" accept="image/*" multiple style="display:none" onchange="handleImages(event)">
                </div>
                <div id="imagePreview" class="image-preview"></div>
            </div>

            <div class="form-group">
                <label>추가 메모</label>
                <textarea id="notes" placeholder="특이사항, 클라이언트 요청 등"></textarea>
            </div>

            <button type="submit" class="btn-primary">브랜드 전략 설계하기</button>
        </form>

        <div id="loading" class="loading" style="display:none">
            <div class="spinner"></div>
            <p>브랜드 전략을 분석하고 있습니다</p>
            <p class="loading-sub">약 20–40초 소요됩니다</p>
        </div>

        <div id="results" class="card results" style="display:none">
            <div class="tabs" id="tabs"></div>
            <div id="tabContent" class="tab-content"></div>
            <div class="btn-row">
                <button class="btn-primary btn-inline" onclick="downloadPPT()">PPT 다운로드</button>
                <button class="btn-secondary" onclick="resetForm()">새로 시작</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
